<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Add Employee </h2>
    <form action="" method="post">
        {% csrf_token %}

        <button type="submit">Save</button>
    </form>
</body>
</html>
